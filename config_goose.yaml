models:
  - id: "workhorse"
    name: "workhorse"
    provider: "openai"
    alias: "Local Gemma Workhorse"
    request_params:
      temperature: 0.1
      top_p: 0.1
      top_k: 20
      # Hier übergeben wir das Objekt exakt so, wie von Unsloth/Gemma-4 spezifiziert:
      chat_template_kwargs:
        enable_thinking: false

  - id: "planner"
    name: "planner"
    provider: "openai"
    alias: "Local Gemma Planner"
    request_params:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
      # Hier schalten wir das native Template-Thinking für den Sparringspartner an:
      chat_template_kwargs:
        enable_thinking: true