# defaults/models/gemma.yaml
# Google Gemma – recommended sampling parameters (hardware-agnostic)
# Source: https://ai.google.dev/gemma/docs/
#
# Referenced in profiles via:
#   defaults:
#     model: "gemma"
#
# Overriding profile values will overwrite these defaults (deep merge).
# Deviations should be commented with # ! in the profile.

serve:
  sampling:
    temperature: 1.0
    top_p: 0.95
    top_k: 64
    repeat_penalty: 1.0
    min_p: 0.0