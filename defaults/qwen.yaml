# defaults/models/qwen.yaml
# Alibaba Qwen – recommended sampling parameters (hardware-agnostic)
# Source: https://qwen.readthedocs.io/
#
# Referenced in profiles via:
#   defaults:
#     model: "qwen"

serve:
  sampling:
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    repeat_penalty: 1.05
    min_p: 0.0